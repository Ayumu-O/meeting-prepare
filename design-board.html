<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業設計ボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16171b;
    --surface-hover: #1c1d22;
    --border: #2a2b31;
    --border-active: #3d3e46;
    --text: #e4e4e7;
    --text-muted: #71717a;
    --text-dim: #3f3f46;
    --accent: #60a5fa;
    --phase-1: #60a5fa;
    --phase-2: #fb923c;
    --phase-3: #a78bfa;
    --phase-4: #34d399;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  .header {
    padding: 20px 32px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .header-title span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 12px;
    font-weight: 400;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .btn-header {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-header:hover {
    border-color: var(--border-active);
    color: var(--text);
    background: var(--surface-hover);
  }

  .btn-header.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0f11;
    font-weight: 500;
  }

  .btn-header.primary:hover { opacity: 0.9; }

  .board {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 57px);
  }

  .column {
    flex: 1;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .column:last-child { border-right: none; }

  .column-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
  }

  .phase-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .phase-num {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    color: #0e0f11;
  }

  .column:nth-child(1) .phase-num { background: var(--phase-1); }
  .column:nth-child(2) .phase-num { background: var(--phase-2); }
  .column:nth-child(3) .phase-num { background: var(--phase-3); }
  .column:nth-child(4) .phase-num { background: var(--phase-4); }

  .phase-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .column-title {
    font-size: 14px;
    font-weight: 500;
  }

  .column-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .column:not(:last-child) .column-header::after {
    content: '';
    position: absolute;
    right: -7px;
    top: 50%;
    width: 12px;
    height: 12px;
    border-right: 2px solid var(--border-active);
    border-bottom: 2px solid var(--border-active);
    transform: translateY(-50%) rotate(-45deg);
    z-index: 2;
    opacity: 0.5;
  }

  .column-progress {
    height: 2px;
    background: var(--border);
  }

  .column-progress-fill {
    height: 100%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .column:nth-child(1) .column-progress-fill { background: var(--phase-1); }
  .column:nth-child(2) .column-progress-fill { background: var(--phase-2); }
  .column:nth-child(3) .column-progress-fill { background: var(--phase-3); }
  .column:nth-child(4) .column-progress-fill { background: var(--phase-4); }

  .column-body {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }

  .column-body::-webkit-scrollbar { width: 4px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Section */
  .section { margin-bottom: 16px; }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 6px 10px;
    border-radius: 6px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-label.phase1 { background: rgba(96, 165, 250, 0.08); }
  .section-label.phase1 .dot { background: var(--phase-1); }
  .section-label.phase2 { background: rgba(251, 146, 60, 0.08); }
  .section-label.phase2 .dot { background: var(--phase-2); }
  .section-label.phase3 { background: rgba(167, 139, 250, 0.08); }
  .section-label.phase3 .dot { background: var(--phase-3); }
  .section-label.phase4 { background: rgba(52, 211, 153, 0.08); }
  .section-label.phase4 .dot { background: var(--phase-4); }

  .field-textarea {
    width: 100%;
    min-height: 56px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
  }

  .field-textarea::placeholder { color: var(--text-dim); }

  .column:nth-child(1) .field-textarea:focus { border-color: var(--phase-1); }
  .column:nth-child(2) .field-textarea:focus { border-color: var(--phase-2); }
  .column:nth-child(3) .field-textarea:focus { border-color: var(--phase-3); }
  .column:nth-child(4) .field-textarea:focus { border-color: var(--phase-4); }

  .field-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    transition: border-color 0.2s;
    outline: none;
  }

  .field-input:focus { border-color: var(--phase-1); }
  .field-input::placeholder { color: var(--text-dim); }

  /* Step items (Column 2) */
  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 8px;
    transition: all 0.2s;
  }

  .step-item:hover {
    border-color: var(--border-active);
    background: var(--surface-hover);
  }

  .step-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 18px;
    padding-top: 1px;
  }

  .step-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    resize: none;
    width: 100%;
    outline: none;
  }

  .step-text::placeholder { color: var(--text-dim); }

  .step-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    transition: all 0.15s;
  }

  .step-item:hover .step-delete { opacity: 1; }
  .step-delete:hover { color: #ef4444; }

  /* Hypothesis items (Column 3) */
  .hypo-item {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .hypo-item:hover { border-color: var(--border-active); }

  .hypo-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }

  .hypo-toggle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
    width: 14px;
    text-align: center;
  }

  .hypo-item.open .hypo-toggle { transform: rotate(90deg); }

  .hypo-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 18px;
  }

  .hypo-title-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    outline: none;
  }

  .hypo-title-input::placeholder { color: var(--text-dim); }

  .hypo-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }

  .hypo-item:hover .hypo-delete { opacity: 1; }
  .hypo-delete:hover { color: #ef4444; }

  .hypo-body {
    display: none;
    padding: 0 12px 12px;
  }

  .hypo-item.open .hypo-body { display: block; }

  .hypo-sub-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 10px 0 6px;
  }

  .hypo-sub-label:first-child { margin-top: 0; }

  .hypo-textarea {
    width: 100%;
    min-height: 48px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    line-height: 1.6;
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
  }

  .hypo-textarea:focus { border-color: var(--phase-3); }
  .hypo-textarea::placeholder { color: var(--text-dim); }

  /* Result items (Column 4) */
  .result-sub-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    margin: 10px 0 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-sub-label:first-child { margin-top: 0; }

  .result-sub-label.fact { color: var(--phase-4); }
  .result-sub-label.interpretation { color: #f59e0b; }
  .result-sub-label.action { color: #f472b6; }

  .result-textarea {
    width: 100%;
    min-height: 48px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    line-height: 1.6;
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
  }

  .result-textarea:focus { border-color: var(--phase-4); }
  .result-textarea::placeholder { color: var(--text-dim); }

  .result-item {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .result-item:hover { border-color: var(--border-active); }

  .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }

  .result-toggle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
    width: 14px;
    text-align: center;
  }

  .result-item.open .result-toggle { transform: rotate(90deg); }

  .result-title {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .result-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }

  .result-item:hover .result-delete { opacity: 1; }
  .result-delete:hover { color: #ef4444; }

  .result-body {
    display: none;
    padding: 0 12px 12px;
  }

  .result-item.open .result-body { display: block; }

  .add-btn {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .add-btn:hover {
    border-color: var(--border-active);
    color: var(--text-muted);
    background: var(--surface);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.8;
  }

  .section-separator {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  textarea { overflow: hidden; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .column { animation: fadeIn 0.4s ease both; }
  .column:nth-child(1) { animation-delay: 0s; }
  .column:nth-child(2) { animation-delay: 0.06s; }
  .column:nth-child(3) { animation-delay: 0.12s; }
  .column:nth-child(4) { animation-delay: 0.18s; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    作業設計ボード
    <span>Work Design Board</span>
  </div>
  <div class="header-actions">
    <button class="btn-header" id="resetBtn">リセット</button>
    <button class="btn-header primary" id="exportBtn">エクスポート</button>
  </div>
</div>

<div class="board" id="board">
  <!-- Column 1: Prerequisites -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog1"></div></div>
    <div class="column-header">
      <div class="phase-indicator">
        <div class="phase-num">1</div>
        <div class="phase-label">Prerequisites</div>
      </div>
      <div class="column-title">前提条件</div>
      <div class="column-subtitle">何のために・いつまでに・誰に・何を・どうするか</div>
    </div>
    <div class="column-body" id="prereqBody"></div>
  </div>

  <!-- Column 2: Steps -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog2"></div></div>
    <div class="column-header">
      <div class="phase-indicator">
        <div class="phase-num">2</div>
        <div class="phase-label">Steps</div>
      </div>
      <div class="column-title">段取り</div>
      <div class="column-subtitle">どのような手順で進めるか</div>
    </div>
    <div class="column-body" id="stepsBody"></div>
  </div>

  <!-- Column 3: Hypothesis -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog3"></div></div>
    <div class="column-header">
      <div class="phase-indicator">
        <div class="phase-num">3</div>
        <div class="phase-label">Hypothesis</div>
      </div>
      <div class="column-title">仮説</div>
      <div class="column-subtitle">仮説でストーリーラインを立ててから検証する</div>
    </div>
    <div class="column-body" id="hypoBody"></div>
  </div>

  <!-- Column 4: Results -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog4"></div></div>
    <div class="column-header">
      <div class="phase-indicator">
        <div class="phase-num">4</div>
        <div class="phase-label">Results</div>
      </div>
      <div class="column-title">結果整理</div>
      <div class="column-subtitle">事実・解釈・アクションを分けて記録する</div>
    </div>
    <div class="column-body" id="resultBody"></div>
  </div>
</div>

<script>
// --- State ---
const state = {
  purpose: '',
  deadline: '',
  target: '',
  what: '',
  how: '',
  steps: [],
  storyline: '',
  hypotheses: [],
  results: []
};

let stepCounter = 0;
let hypoCounter = 0;
let resultCounter = 0;

const prereqFields = [
  { key: 'purpose',  label: '何のために（目的）',    placeholder: '例: 新機能の技術的実現可能性を確認するため' },
  { key: 'deadline', label: 'いつまでに（期限）',     placeholder: '例: 3/20（水）まで' },
  { key: 'target',   label: '誰に（対象・報告先）',    placeholder: '例: プロジェクトリーダー / チーム全体' },
  { key: 'what',     label: '何を（成果物）',         placeholder: '例: 検証結果レポート / 動作するプロトタイプ' },
  { key: 'how',      label: 'どうする（完了条件）',    placeholder: '例: 3パターンの比較表を作成し、推奨案を提示する' }
];

// --- DOM Helpers ---
function el(tag, cls, attrs) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'textContent') e.textContent = v;
    else if (k === 'placeholder') e.placeholder = v;
    else if (k === 'value') e.value = v;
    else if (k === 'rows') e.rows = v;
    else if (k === 'type') e.type = v;
    else e.setAttribute(k, v);
  });
  return e;
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';
}

// --- Render: Prerequisites (Column 1) ---
function renderPrereqs() {
  const container = document.getElementById('prereqBody');
  container.replaceChildren();

  prereqFields.forEach(field => {
    const section = el('div', 'section');
    const label = el('div', 'section-label phase1');
    const dot = el('span', 'dot');
    label.append(dot, document.createTextNode(field.label));

    let input;
    if (field.key === 'deadline') {
      input = el('input', 'field-input', { type: 'text', placeholder: field.placeholder });
      input.value = state[field.key] || '';
      input.addEventListener('input', () => {
        state[field.key] = input.value;
        updateProgress();
        saveState();
      });
    } else {
      input = el('textarea', 'field-textarea', { placeholder: field.placeholder });
      input.value = state[field.key] || '';
      input.addEventListener('input', () => {
        state[field.key] = input.value;
        autoResize(input);
        updateProgress();
        saveState();
      });
    }

    section.append(label, input);
    container.appendChild(section);
    if (input.tagName === 'TEXTAREA') autoResize(input);
  });
}

// --- Render: Steps (Column 2) ---
function renderSteps() {
  const container = document.getElementById('stepsBody');
  container.replaceChildren();

  state.steps.forEach((s, i) => {
    const item = el('div', 'step-item');
    const num = el('span', 'step-num', { textContent: (i + 1) + '.' });
    const textarea = el('textarea', 'step-text', { placeholder: '手順を入力...', rows: '1' });
    textarea.value = s.text;
    textarea.addEventListener('input', () => {
      s.text = textarea.value;
      autoResize(textarea);
      updateProgress();
      saveState();
    });
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const id = ++stepCounter;
        const idx = state.steps.indexOf(s);
        state.steps.splice(idx + 1, 0, { id, text: '' });
        renderSteps();
        updateProgress();
        saveState();
        setTimeout(() => {
          const textareas = container.querySelectorAll('.step-text');
          if (textareas[idx + 1]) textareas[idx + 1].focus();
        }, 50);
      }
    });
    const delBtn = el('button', 'step-delete', { textContent: '\u00d7' });
    delBtn.addEventListener('click', () => {
      state.steps = state.steps.filter(x => x.id !== s.id);
      renderSteps();
      updateProgress();
      saveState();
    });
    item.append(num, textarea, delBtn);
    container.appendChild(item);
  });

  container.querySelectorAll('.step-text').forEach(t => autoResize(t));

  const addBtn = el('button', 'add-btn', { textContent: '+ 手順を追加' });
  addBtn.addEventListener('click', () => {
    const id = ++stepCounter;
    state.steps.push({ id, text: '' });
    renderSteps();
    updateProgress();
    saveState();
    setTimeout(() => {
      const textareas = container.querySelectorAll('.step-text');
      const last = textareas[textareas.length - 1];
      if (last) last.focus();
    }, 50);
  });
  container.appendChild(addBtn);
}

// --- Render: Hypotheses (Column 3) ---
function renderHypotheses() {
  const container = document.getElementById('hypoBody');
  container.replaceChildren();

  // Storyline
  const storySection = el('div', 'section');
  const storyLabel = el('div', 'section-label phase3');
  const storyDot = el('span', 'dot');
  storyLabel.append(storyDot, document.createTextNode('ストーリーライン（全体仮説）'));
  const storyTextarea = el('textarea', 'field-textarea', {
    placeholder: '例: 「質問文の曖昧さが回答精度低下の主因であり、ヒアリング機能を追加すれば精度が改善する」という仮説を検証する'
  });
  storyTextarea.style.minHeight = '80px';
  storyTextarea.value = state.storyline || '';
  storyTextarea.addEventListener('input', () => {
    state.storyline = storyTextarea.value;
    autoResize(storyTextarea);
    updateProgress();
    saveState();
  });
  storySection.append(storyLabel, storyTextarea);
  container.appendChild(storySection);
  autoResize(storyTextarea);

  // Separator
  container.appendChild(el('hr', 'section-separator'));

  // Hypothesis list label
  const hypoLabel = el('div', 'section-label phase3');
  const hypoDot = el('span', 'dot');
  hypoLabel.append(hypoDot, document.createTextNode('検証項目'));
  container.appendChild(hypoLabel);

  state.hypotheses.forEach((h, i) => {
    const item = el('div', 'hypo-item' + (h.open ? ' open' : ''));

    const header = el('div', 'hypo-header');
    const toggleIcon = el('span', 'hypo-toggle', { textContent: '\u25b6' });
    const num = el('span', 'hypo-num', { textContent: (i + 1) + '.' });
    const titleInput = el('input', 'hypo-title-input', { placeholder: '検証項目を入力...' });
    titleInput.value = h.title;
    titleInput.addEventListener('input', () => {
      h.title = titleInput.value;
      updateResultTitles();
      saveState();
    });
    titleInput.addEventListener('click', (e) => e.stopPropagation());
    const delBtn = el('button', 'hypo-delete', { textContent: '\u00d7' });
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.results = state.results.filter(r => r.hypoId !== h.id);
      state.hypotheses = state.hypotheses.filter(x => x.id !== h.id);
      renderHypotheses();
      renderResults();
      updateProgress();
      saveState();
    });

    header.append(toggleIcon, num, titleInput, delBtn);
    header.addEventListener('click', (e) => {
      if (e.target === titleInput) return;
      h.open = !h.open;
      renderHypotheses();
      saveState();
    });

    const body = el('div', 'hypo-body');
    const subFields = [
      { key: 'hypothesis', label: '仮説（問いに対する主張）', placeholder: '例: 質問文が曖昧だと回答がブレる' },
      { key: 'method', label: '検証方法', placeholder: '例: 曖昧な質問と明確な質問を各10件ずつ実行し、正答率を比較する' },
      { key: 'criteria', label: '判断基準', placeholder: '例: 正答率が20%以上改善すれば有効と判断する' }
    ];

    subFields.forEach(sf => {
      const subLabel = el('div', 'hypo-sub-label', { textContent: sf.label });
      const textarea = el('textarea', 'hypo-textarea', { placeholder: sf.placeholder });
      textarea.value = h[sf.key] || '';
      textarea.addEventListener('input', () => {
        h[sf.key] = textarea.value;
        autoResize(textarea);
        updateProgress();
        saveState();
      });
      body.append(subLabel, textarea);
    });

    item.append(header, body);
    container.appendChild(item);

    if (h.open) {
      body.querySelectorAll('textarea').forEach(t => autoResize(t));
    }
  });

  const addBtn = el('button', 'add-btn', { textContent: '+ 検証項目を追加' });
  addBtn.addEventListener('click', () => {
    const id = ++hypoCounter;
    state.hypotheses.push({ id, title: '', hypothesis: '', method: '', criteria: '', open: true });
    state.results.push({
      id: ++resultCounter,
      hypoId: id,
      title: '',
      fact: '',
      interpretation: '',
      action: '',
      open: false
    });
    renderHypotheses();
    renderResults();
    updateProgress();
    saveState();
    setTimeout(() => {
      const inputs = container.querySelectorAll('.hypo-title-input');
      const last = inputs[inputs.length - 1];
      if (last) last.focus();
    }, 50);
  });
  container.appendChild(addBtn);
}

function updateResultTitles() {
  state.hypotheses.forEach(h => {
    const r = state.results.find(r => r.hypoId === h.id);
    if (r) r.title = h.title;
  });
  renderResults();
}

// --- Render: Results (Column 4) ---
function renderResults() {
  const container = document.getElementById('resultBody');
  container.replaceChildren();

  if (state.results.length === 0) {
    // Free-form mode
    const freeSection = el('div', 'section');
    const resultFields = [
      { key: '_freeFact', label: '事実（何が起きたか）', placeholder: '例: テストケース20件中18件が正答', cls: 'fact' },
      { key: '_freeInterpretation', label: '解釈（それはどういう意味か）', placeholder: '例: 基本的な精度は十分だが、複合質問への対応が弱い', cls: 'interpretation' },
      { key: '_freeAction', label: 'アクション（次に何をするか）', placeholder: '例: 複合質問のパターンを分類し、個別対策を検討する', cls: 'action' }
    ];

    resultFields.forEach(rf => {
      const subLabel = el('div', 'result-sub-label ' + rf.cls, { textContent: rf.label });
      const textarea = el('textarea', 'result-textarea', { placeholder: rf.placeholder });
      textarea.style.minHeight = '70px';
      textarea.value = state[rf.key] || '';
      textarea.addEventListener('input', () => {
        state[rf.key] = textarea.value;
        autoResize(textarea);
        updateProgress();
        saveState();
      });
      freeSection.append(subLabel, textarea);
    });

    container.appendChild(freeSection);
    container.querySelectorAll('textarea').forEach(t => autoResize(t));
    return;
  }

  // Linked result items
  state.results.forEach((r, i) => {
    const item = el('div', 'result-item' + (r.open ? ' open' : ''));

    const header = el('div', 'result-header');
    const toggleIcon = el('span', 'result-toggle', { textContent: '\u25b6' });
    const title = el('span', 'result-title', { textContent: r.title || ('検証項目 ' + (i + 1)) });
    const delBtn = el('button', 'result-delete', { textContent: '\u00d7' });
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.results = state.results.filter(x => x.id !== r.id);
      renderResults();
      updateProgress();
      saveState();
    });

    header.append(toggleIcon, title, delBtn);
    header.addEventListener('click', () => {
      r.open = !r.open;
      renderResults();
      saveState();
    });

    const body = el('div', 'result-body');
    const subFields = [
      { key: 'fact', label: '事実（何が起きたか）', placeholder: '例: テストケース20件中18件が正答', cls: 'fact' },
      { key: 'interpretation', label: '解釈（それはどういう意味か）', placeholder: '例: 基本的な精度は十分だが、複合質問への対応が弱い', cls: 'interpretation' },
      { key: 'action', label: 'アクション（次に何をするか）', placeholder: '例: 複合質問のパターンを分類し、個別対策を検討する', cls: 'action' }
    ];

    subFields.forEach(sf => {
      const subLabel = el('div', 'result-sub-label ' + sf.cls, { textContent: sf.label });
      const textarea = el('textarea', 'result-textarea', { placeholder: sf.placeholder });
      textarea.value = r[sf.key] || '';
      textarea.addEventListener('input', () => {
        r[sf.key] = textarea.value;
        autoResize(textarea);
        updateProgress();
        saveState();
      });
      body.append(subLabel, textarea);
    });

    item.append(header, body);
    container.appendChild(item);

    if (r.open) {
      body.querySelectorAll('textarea').forEach(t => autoResize(t));
    }
  });
}

// --- Progress ---
function updateProgress() {
  const filledPrereq = prereqFields.filter(f => (state[f.key] || '').trim()).length;
  document.getElementById('prog1').style.width = (filledPrereq / prereqFields.length * 100) + '%';

  const filledSteps = state.steps.filter(s => s.text.trim()).length;
  const stepsPct = state.steps.length > 0 ? (filledSteps / state.steps.length * 100) : 0;
  document.getElementById('prog2').style.width = stepsPct + '%';

  const parts = [];
  if ((state.storyline || '').trim()) parts.push(1);
  const hypoFilled = state.hypotheses.filter(h => h.title.trim() && h.hypothesis.trim()).length;
  const hypoPct = state.hypotheses.length > 0
    ? ((parts.length + hypoFilled) / (1 + state.hypotheses.length) * 100)
    : (parts.length > 0 ? 100 : 0);
  document.getElementById('prog3').style.width = hypoPct + '%';

  if (state.results.length > 0) {
    const filledResults = state.results.filter(r => r.fact.trim() || r.interpretation.trim() || r.action.trim()).length;
    document.getElementById('prog4').style.width = (filledResults / state.results.length * 100) + '%';
  } else {
    const freeKeys = ['_freeFact', '_freeInterpretation', '_freeAction'];
    const filledFree = freeKeys.filter(k => (state[k] || '').trim()).length;
    document.getElementById('prog4').style.width = (filledFree / 3 * 100) + '%';
  }
}

// --- Export ---
function exportBoard() {
  let md = '# 作業設計ボード\n\n';

  md += '## 前提条件\n\n';
  prereqFields.forEach(f => {
    md += '### ' + f.label + '\n' + (state[f.key] || '未入力') + '\n\n';
  });

  md += '## 段取り\n\n';
  if (state.steps.length > 0) {
    state.steps.forEach((s, i) => {
      md += (i + 1) + '. ' + (s.text || '(空)') + '\n';
    });
    md += '\n';
  } else {
    md += '未入力\n\n';
  }

  md += '## 仮説\n\n';
  md += '### ストーリーライン\n' + (state.storyline || '未入力') + '\n\n';
  if (state.hypotheses.length > 0) {
    state.hypotheses.forEach((h, i) => {
      md += '### 検証項目 ' + (i + 1) + ': ' + (h.title || '(空)') + '\n';
      md += '- **仮説**: ' + (h.hypothesis || '(空)') + '\n';
      md += '- **検証方法**: ' + (h.method || '(空)') + '\n';
      md += '- **判断基準**: ' + (h.criteria || '(空)') + '\n\n';
    });
  }

  md += '## 結果整理\n\n';
  if (state.results.length > 0) {
    state.results.forEach((r, i) => {
      md += '### ' + (r.title || '検証項目 ' + (i + 1)) + '\n';
      md += '- **事実**: ' + (r.fact || '(空)') + '\n';
      md += '- **解釈**: ' + (r.interpretation || '(空)') + '\n';
      md += '- **アクション**: ' + (r.action || '(空)') + '\n\n';
    });
  } else {
    md += '### 事実\n' + (state._freeFact || '未入力') + '\n\n';
    md += '### 解釈\n' + (state._freeInterpretation || '未入力') + '\n\n';
    md += '### アクション\n' + (state._freeAction || '未入力') + '\n\n';
  }

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '作業設計_' + new Date().toISOString().slice(0, 10) + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

// --- Reset ---
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('すべての内容をリセットしますか？')) return;
  prereqFields.forEach(f => { state[f.key] = ''; });
  state.steps = [];
  state.storyline = '';
  state.hypotheses = [];
  state.results = [];
  state._freeFact = '';
  state._freeInterpretation = '';
  state._freeAction = '';
  stepCounter = 0;
  hypoCounter = 0;
  resultCounter = 0;
  localStorage.removeItem('designBoard');
  renderAll();
});

document.getElementById('exportBtn').addEventListener('click', exportBoard);

// --- Persistence ---
function saveState() {
  localStorage.setItem('designBoard', JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem('designBoard');
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    prereqFields.forEach(f => { state[f.key] = s[f.key] || ''; });
    state.steps = s.steps || [];
    state.storyline = s.storyline || '';
    state.hypotheses = s.hypotheses || [];
    state.results = s.results || [];
    state._freeFact = s._freeFact || '';
    state._freeInterpretation = s._freeInterpretation || '';
    state._freeAction = s._freeAction || '';
    stepCounter = state.steps.reduce((max, s) => Math.max(max, s.id), 0);
    hypoCounter = state.hypotheses.reduce((max, h) => Math.max(max, h.id), 0);
    resultCounter = state.results.reduce((max, r) => Math.max(max, r.id), 0);
  } catch(e) { /* ignore */ }
}

// --- Init ---
function renderAll() {
  renderPrereqs();
  renderSteps();
  renderHypotheses();
  renderResults();
  updateProgress();
}

loadState();
renderAll();
</script>

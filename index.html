<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議設計ボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16171b;
    --surface-hover: #1c1d22;
    --border: #2a2b31;
    --border-active: #3d3e46;
    --text: #e4e4e7;
    --text-muted: #71717a;
    --text-dim: #3f3f46;
    --accent: #f59e0b;
    --accent-dim: rgba(245, 158, 11, 0.12);
    --accent-glow: rgba(245, 158, 11, 0.06);
    --step-1: #f59e0b;
    --step-2: #fb923c;
    --step-3: #f472b6;
    --step-4: #a78bfa;
    --step-5: #34d399;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  .header {
    padding: 20px 32px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-title span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 12px;
    font-weight: 400;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .btn-header {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-header:hover {
    border-color: var(--border-active);
    color: var(--text);
    background: var(--surface-hover);
  }

  .btn-header.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0f11;
    font-weight: 500;
  }

  .btn-header.primary:hover { opacity: 0.9; }

  .board {
    display: flex;
    gap: 0;
    padding: 0;
    min-height: calc(100vh - 57px);
  }

  .column {
    flex: 1;
    min-width: 280px;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .column:last-child {
    border-right: none;
    max-width: none;
    flex: 1.2;
  }

  .column-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: var(--bg);
  }

  .step-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .step-num {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    color: #0e0f11;
  }

  .column:nth-child(1) .step-num { background: var(--step-1); }
  .column:nth-child(2) .step-num { background: var(--step-2); }
  .column:nth-child(3) .step-num { background: var(--step-3); }
  .column:nth-child(4) .step-num { background: var(--step-4); }
  .column:nth-child(5) .step-num { background: var(--step-5); }

  .step-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .column-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .column-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .column:not(:last-child) .column-header::after {
    content: '';
    position: absolute;
    right: -7px;
    top: 50%;
    width: 12px;
    height: 12px;
    border-right: 2px solid var(--border-active);
    border-bottom: 2px solid var(--border-active);
    transform: translateY(-50%) rotate(-45deg);
    z-index: 2;
    opacity: 0.5;
  }

  .column-body {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }

  .column-body::-webkit-scrollbar { width: 4px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Type buttons */
  .type-btn {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-dim);
    text-align: left;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .type-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--step-1);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .type-btn:hover {
    border-color: var(--border-active);
    color: var(--text-muted);
    background: var(--surface-hover);
  }

  .type-btn.active {
    border-color: var(--step-1);
    color: var(--text);
    background: var(--accent-dim);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .type-btn.active::before { opacity: 1; }

  .type-btn-label {
    font-size: 13px;
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
  }

  .type-btn-sub {
    font-family: var(--mono);
    font-size: 10px;
    opacity: 0.6;
  }

  /* Goal */
  .goal-textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
  }

  .goal-textarea:focus { outline: none; border-color: var(--step-2); }
  .goal-textarea::placeholder { color: var(--text-dim); }

  .goal-examples { margin-top: 16px; }

  .goal-example-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .goal-chip {
    display: inline-block;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    margin: 0 4px 6px 0;
    transition: all 0.2s;
  }

  .goal-chip:hover {
    border-color: var(--step-2);
    color: var(--text);
    background: rgba(251, 146, 60, 0.08);
  }

  /* Points */
  .point-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 8px;
    transition: all 0.2s;
  }

  .point-item:hover {
    border-color: var(--border-active);
    background: var(--surface-hover);
  }

  .point-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 18px;
    padding-top: 1px;
  }

  .point-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    resize: none;
    width: 100%;
    outline: none;
  }

  .point-text::placeholder { color: var(--text-dim); }

  .point-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    transition: all 0.15s;
  }

  .point-item:hover .point-delete { opacity: 1; }
  .point-delete:hover { color: #ef4444; }

  .add-btn {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .add-btn:hover {
    border-color: var(--border-active);
    color: var(--text-muted);
    background: var(--surface);
  }

  /* Discussion */
  .discussion-section { margin-bottom: 16px; }

  .discussion-point-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 6px 10px;
    background: rgba(167, 139, 250, 0.08);
    border-radius: 6px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .discussion-point-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--step-4);
    flex-shrink: 0;
  }

  .discussion-textarea {
    width: 100%;
    min-height: 80px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
  }

  .discussion-textarea:focus { outline: none; border-color: var(--step-4); }
  .discussion-textarea::placeholder { color: var(--text-dim); }

  .discussion-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.8;
  }

  /* Assignees & Todos */
  .assignee-section { margin-bottom: 20px; }

  .assignee-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .assignee-avatar {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #0e0f11;
  }

  .assignee-name { font-size: 13px; font-weight: 500; }

  .assignee-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: background 0.15s;
  }

  .todo-item:hover { background: var(--surface-hover); }

  .todo-check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border-active);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .todo-check:hover { border-color: var(--step-5); }

  .todo-check.checked {
    background: var(--step-5);
    border-color: var(--step-5);
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .todo-text {
    flex: 1;
    font-size: 12px;
    line-height: 1.5;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    outline: none;
    width: 100%;
  }

  .todo-text::placeholder { color: var(--text-dim); }

  .todo-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }

  .todo-item:hover .todo-delete { opacity: 1; }
  .todo-delete:hover { color: #ef4444; }

  .add-assignee-area {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }

  .add-assignee-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-assignee-input:focus { border-color: var(--step-5); }
  .add-assignee-input::placeholder { color: var(--text-dim); }

  .add-assignee-btn {
    padding: 8px 14px;
    border: 1px solid var(--step-5);
    border-radius: 8px;
    background: rgba(52, 211, 153, 0.1);
    color: var(--step-5);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .add-assignee-btn:hover { background: rgba(52, 211, 153, 0.18); }

  .column-progress {
    height: 2px;
    background: var(--border);
    position: relative;
  }

  .column-progress-fill {
    height: 100%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .column:nth-child(1) .column-progress-fill { background: var(--step-1); }
  .column:nth-child(2) .column-progress-fill { background: var(--step-2); }
  .column:nth-child(3) .column-progress-fill { background: var(--step-3); }
  .column:nth-child(4) .column-progress-fill { background: var(--step-4); }
  .column:nth-child(5) .column-progress-fill { background: var(--step-5); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .column { animation: fadeIn 0.4s ease both; }
  .column:nth-child(1) { animation-delay: 0s; }
  .column:nth-child(2) { animation-delay: 0.06s; }
  .column:nth-child(3) { animation-delay: 0.12s; }
  .column:nth-child(4) { animation-delay: 0.18s; }
  .column:nth-child(5) { animation-delay: 0.24s; }

  textarea { overflow: hidden; }

  .remove-assignee-btn {
    opacity: 0.5;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }
  .remove-assignee-btn:hover { color: #ef4444; opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    会議設計ボード
    <span>Meeting Design Board</span>
  </div>
  <div class="header-actions">
    <button class="btn-header" id="resetBtn">リセット</button>
    <button class="btn-header primary" id="exportBtn">エクスポート</button>
  </div>
</div>

<div class="board" id="board">
  <!-- Column 1: Meeting Type -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog1"></div></div>
    <div class="column-header">
      <div class="step-indicator">
        <div class="step-num">1</div>
        <div class="step-label">Step 1</div>
      </div>
      <div class="column-title">会議の種類</div>
      <div class="column-subtitle">会議タイプを選択してください</div>
    </div>
    <div class="column-body" id="typeButtons"></div>
  </div>

  <!-- Column 2: Goal -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog2"></div></div>
    <div class="column-header">
      <div class="step-indicator">
        <div class="step-num">2</div>
        <div class="step-label">Step 2</div>
      </div>
      <div class="column-title">会議のゴール</div>
      <div class="column-subtitle">何を持ち帰るかを決める</div>
    </div>
    <div class="column-body" id="goalBody"></div>
  </div>

  <!-- Column 3: Discussion Points -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog3"></div></div>
    <div class="column-header">
      <div class="step-indicator">
        <div class="step-num">3</div>
        <div class="step-label">Step 3</div>
      </div>
      <div class="column-title">論点</div>
      <div class="column-subtitle">議論の枠組みを整理する</div>
    </div>
    <div class="column-body" id="pointsBody"></div>
  </div>

  <!-- Column 4: Discussion -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog4"></div></div>
    <div class="column-header">
      <div class="step-indicator">
        <div class="step-num">4</div>
        <div class="step-label">Step 4</div>
      </div>
      <div class="column-title">議論</div>
      <div class="column-subtitle">論点ごとに議事録を記録</div>
    </div>
    <div class="column-body" id="discussionArea"></div>
  </div>

  <!-- Column 5: Decisions -->
  <div class="column">
    <div class="column-progress"><div class="column-progress-fill" id="prog5"></div></div>
    <div class="column-header">
      <div class="step-indicator">
        <div class="step-num">5</div>
        <div class="step-label">Step 5</div>
      </div>
      <div class="column-title">決定事項</div>
      <div class="column-subtitle">ToDo / 担当者ごとに整理</div>
    </div>
    <div class="column-body" id="decisionsBody"></div>
  </div>
</div>

<script>
// --- State ---
const state = {
  meetingType: null,
  goal: '',
  points: [],
  discussions: {},
  assignees: []
};

const meetingTypes = [
  { id: 'discovery', label: '問題探索型', sub: 'Problem Discovery' },
  { id: 'solving', label: '問題解決型', sub: 'Problem Solving' },
  { id: 'decision', label: '意思決定型', sub: 'Decision Making' },
  { id: 'ideation', label: 'アイデア創出型', sub: 'Ideation' },
  { id: 'consensus', label: '合意形成型', sub: 'Consensus Building' }
];

const goalChips = ['方針を決める', '検証項目を決める', '次のアクションを決める', '担当を割り振る', 'スケジュールを合意する'];
const avatarColors = ['#f59e0b', '#fb923c', '#f472b6', '#a78bfa', '#34d399', '#60a5fa', '#f87171', '#facc15'];

let pointCounter = 0;

// --- DOM Helpers ---
function el(tag, cls, attrs) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'textContent') e.textContent = v;
    else if (k === 'placeholder') e.placeholder = v;
    else if (k === 'value') e.value = v;
    else if (k === 'rows') e.rows = v;
    else if (k === 'type') e.type = v;
    else e.setAttribute(k, v);
  });
  return e;
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';
}

// --- Render: Type Buttons ---
function renderTypes() {
  const container = document.getElementById('typeButtons');
  container.replaceChildren();
  meetingTypes.forEach(t => {
    const btn = el('button', 'type-btn' + (state.meetingType === t.id ? ' active' : ''));
    const lbl = el('span', 'type-btn-label', { textContent: t.label });
    const sub = el('span', 'type-btn-sub', { textContent: t.sub });
    btn.append(lbl, sub);
    btn.addEventListener('click', () => {
      state.meetingType = state.meetingType === t.id ? null : t.id;
      renderTypes();
      updateProgress();
      saveState();
    });
    container.appendChild(btn);
  });
}

// --- Render: Goal ---
function renderGoal() {
  const container = document.getElementById('goalBody');
  container.replaceChildren();

  const textarea = el('textarea', 'goal-textarea', { placeholder: '例: 検証項目の優先順位を決定する' });
  textarea.value = state.goal;
  textarea.addEventListener('input', () => {
    state.goal = textarea.value;
    autoResize(textarea);
    updateProgress();
    saveState();
  });
  container.appendChild(textarea);
  autoResize(textarea);

  const examples = el('div', 'goal-examples');
  const label = el('div', 'goal-example-label', { textContent: 'Quick Select' });
  examples.appendChild(label);

  goalChips.forEach(text => {
    const chip = el('span', 'goal-chip', { textContent: text });
    chip.addEventListener('click', () => {
      state.goal = text;
      textarea.value = text;
      autoResize(textarea);
      updateProgress();
      saveState();
    });
    examples.appendChild(chip);
  });
  container.appendChild(examples);
}

// --- Render: Points ---
function renderPoints() {
  const container = document.getElementById('pointsBody');
  container.replaceChildren();

  const list = el('div');
  state.points.forEach((p, i) => {
    const item = el('div', 'point-item');
    const num = el('span', 'point-num', { textContent: (i + 1) + '.' });
    const textarea = el('textarea', 'point-text', { placeholder: '論点を入力...', rows: '1' });
    textarea.value = p.text;
    textarea.addEventListener('input', () => {
      p.text = textarea.value;
      autoResize(textarea);
      renderDiscussions();
      saveState();
    });
    const delBtn = el('button', 'point-delete', { textContent: '\u00d7' });
    delBtn.addEventListener('click', () => {
      state.points = state.points.filter(pt => pt.id !== p.id);
      delete state.discussions[p.id];
      renderPoints();
      renderDiscussions();
      updateProgress();
      saveState();
    });
    item.append(num, textarea, delBtn);
    list.appendChild(item);
  });
  container.appendChild(list);
  container.querySelectorAll('.point-text').forEach(t => autoResize(t));

  const addBtn = el('button', 'add-btn', { textContent: '+ 論点を追加' });
  addBtn.style.marginTop = '4px';
  addBtn.addEventListener('click', () => {
    const id = ++pointCounter;
    state.points.push({ id, text: '' });
    state.discussions[id] = '';
    renderPoints();
    renderDiscussions();
    updateProgress();
    saveState();
    setTimeout(() => {
      const textareas = container.querySelectorAll('.point-text');
      const last = textareas[textareas.length - 1];
      if (last) last.focus();
    }, 50);
  });
  container.appendChild(addBtn);
}

// --- Render: Discussions ---
function renderDiscussions() {
  const container = document.getElementById('discussionArea');
  container.replaceChildren();

  if (state.points.length === 0) {
    const empty = el('div', 'discussion-empty');
    empty.append(
      document.createTextNode('論点を追加すると'),
      document.createElement('br'),
      document.createTextNode('ここに議事録欄が表示されます')
    );
    container.appendChild(empty);
    return;
  }

  state.points.forEach((p, i) => {
    const section = el('div', 'discussion-section');

    const label = el('div', 'discussion-point-label');
    const dot = el('span', 'dot');
    const labelText = document.createTextNode(p.text || ('論点 ' + (i + 1)));
    label.append(dot, labelText);

    const textarea = el('textarea', 'discussion-textarea', { placeholder: '議論内容を記録...' });
    textarea.value = state.discussions[p.id] || '';
    textarea.addEventListener('input', () => {
      state.discussions[p.id] = textarea.value;
      autoResize(textarea);
      updateProgress();
      saveState();
    });

    section.append(label, textarea);
    container.appendChild(section);
    autoResize(textarea);
  });
}

// --- Render: Assignees & Todos ---
function renderAssignees() {
  const container = document.getElementById('decisionsBody');
  container.replaceChildren();

  const listDiv = el('div');
  state.assignees.forEach((a, aIdx) => {
    const section = el('div', 'assignee-section');

    // Header
    const header = el('div', 'assignee-header');
    const avatar = el('div', 'assignee-avatar');
    avatar.style.background = a.color;
    avatar.textContent = a.name[0];
    const name = el('div', 'assignee-name', { textContent: a.name });
    const doneCount = a.todos.filter(t => t.done).length;
    const count = el('div', 'assignee-count', { textContent: doneCount + '/' + a.todos.length });
    const removeBtn = el('button', 'remove-assignee-btn', { textContent: '\u00d7' });
    removeBtn.addEventListener('click', () => {
      state.assignees.splice(aIdx, 1);
      renderAssignees();
      updateProgress();
      saveState();
    });
    header.append(avatar, name, count, removeBtn);
    section.appendChild(header);

    // Todos
    a.todos.forEach((t, tIdx) => {
      const item = el('div', 'todo-item' + (t.done ? ' done' : ''));

      const check = el('div', 'todo-check' + (t.done ? ' checked' : ''));
      if (t.done) check.textContent = '\u2713';
      check.addEventListener('click', () => {
        t.done = !t.done;
        renderAssignees();
        updateProgress();
        saveState();
      });

      const input = el('input', 'todo-text', { type: 'text', placeholder: 'タスクを入力...' });
      input.value = t.text;
      input.addEventListener('input', () => {
        t.text = input.value;
        saveState();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          a.todos.push({ text: '', done: false });
          renderAssignees();
          saveState();
          setTimeout(() => {
            const inputs = section.querySelectorAll('.todo-text');
            const last = inputs[inputs.length - 1];
            if (last) last.focus();
          }, 50);
        }
      });

      const delBtn = el('button', 'todo-delete', { textContent: '\u00d7' });
      delBtn.addEventListener('click', () => {
        a.todos.splice(tIdx, 1);
        renderAssignees();
        updateProgress();
        saveState();
      });

      item.append(check, input, delBtn);
      section.appendChild(item);
    });

    // Add todo button
    const addTodoBtn = el('button', 'add-btn', { textContent: '+ タスクを追加' });
    addTodoBtn.style.marginTop = '6px';
    addTodoBtn.addEventListener('click', () => {
      a.todos.push({ text: '', done: false });
      renderAssignees();
      saveState();
      setTimeout(() => {
        const inputs = section.querySelectorAll('.todo-text');
        const last = inputs[inputs.length - 1];
        if (last) last.focus();
      }, 50);
    });
    section.appendChild(addTodoBtn);
    listDiv.appendChild(section);
  });
  container.appendChild(listDiv);

  // Add assignee area
  const addArea = el('div', 'add-assignee-area');
  addArea.style.marginTop = '16px';
  const nameInput = el('input', 'add-assignee-input', { type: 'text', placeholder: '担当者名' });
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doAddAssignee(nameInput);
  });
  const addBtn = el('button', 'add-assignee-btn', { textContent: '追加' });
  addBtn.addEventListener('click', () => doAddAssignee(nameInput));
  addArea.append(nameInput, addBtn);
  container.appendChild(addArea);
}

function doAddAssignee(input) {
  const name = input.value.trim();
  if (!name) return;
  const color = avatarColors[state.assignees.length % avatarColors.length];
  state.assignees.push({ name, color, todos: [] });
  input.value = '';
  renderAssignees();
  updateProgress();
  saveState();
}

// --- Progress ---
function updateProgress() {
  document.getElementById('prog1').style.width = state.meetingType ? '100%' : '0%';
  document.getElementById('prog2').style.width = state.goal.trim() ? '100%' : '0%';

  const filledPoints = state.points.filter(p => p.text.trim()).length;
  const pointsPct = state.points.length > 0 ? (filledPoints / state.points.length * 100) : 0;
  document.getElementById('prog3').style.width = pointsPct + '%';

  const filledDisc = state.points.filter(p => (state.discussions[p.id] || '').trim()).length;
  const discPct = state.points.length > 0 ? (filledDisc / state.points.length * 100) : 0;
  document.getElementById('prog4').style.width = discPct + '%';

  const allTodos = state.assignees.flatMap(a => a.todos);
  const doneTodos = allTodos.filter(t => t.done).length;
  const todoPct = allTodos.length > 0 ? (doneTodos / allTodos.length * 100) : 0;
  document.getElementById('prog5').style.width = todoPct + '%';
}

// --- Export ---
function exportBoard() {
  const type = meetingTypes.find(t => t.id === state.meetingType);
  let md = '# 会議設計ボード\n\n';
  md += '## 会議の種類\n' + (type ? type.label + ' (' + type.sub + ')' : '未選択') + '\n\n';
  md += '## 会議のゴール\n' + (state.goal || '未入力') + '\n\n';
  md += '## 論点\n';
  state.points.forEach((p, i) => { md += (i + 1) + '. ' + (p.text || '(空)') + '\n'; });
  md += '\n## 議論\n';
  state.points.forEach((p, i) => {
    md += '### ' + (p.text || '論点 ' + (i + 1)) + '\n' + (state.discussions[p.id] || '(記録なし)') + '\n\n';
  });
  md += '## 決定事項\n';
  state.assignees.forEach(a => {
    md += '### ' + a.name + '\n';
    a.todos.forEach(t => { md += '- [' + (t.done ? 'x' : ' ') + '] ' + (t.text || '(空)') + '\n'; });
    md += '\n';
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '会議設計_' + new Date().toISOString().slice(0, 10) + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

// --- Reset ---
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('すべての内容をリセットしますか？')) return;
  state.meetingType = null;
  state.goal = '';
  state.points = [];
  state.discussions = {};
  state.assignees = [];
  pointCounter = 0;
  localStorage.removeItem('meetingBoard');
  renderAll();
});

document.getElementById('exportBtn').addEventListener('click', exportBoard);

// --- Persistence ---
function saveState() {
  localStorage.setItem('meetingBoard', JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem('meetingBoard');
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    state.meetingType = s.meetingType;
    state.goal = s.goal || '';
    state.points = s.points || [];
    state.discussions = s.discussions || {};
    state.assignees = s.assignees || [];
    pointCounter = state.points.reduce((max, p) => Math.max(max, p.id), 0);
  } catch(e) { /* ignore */ }
}

// --- Init ---
function renderAll() {
  renderTypes();
  renderGoal();
  renderPoints();
  renderDiscussions();
  renderAssignees();
  updateProgress();
}

loadState();
renderAll();
</script>
